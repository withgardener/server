name: Build OpenResty Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/withgardener/server

jobs:
  prepare:
    name: Read version from Dockerfile
    runs-on: ubuntu-latest
    outputs:
      resty_version: ${{ steps.vars.outputs.resty_version }}
      resty_release: ${{ steps.vars.outputs.resty_release }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract RESTY_VERSION and RESTY_RELEASE
        id: vars
        shell: bash
        run: |
          RESTY_VERSION=$(sed -n 's/^ARG RESTY_VERSION="\([^"]*\)"/\1/p' Dockerfile | head -n1)
          RESTY_RELEASE=$(sed -n 's/^ARG RESTY_RELEASE="\([^"]*\)"/\1/p' Dockerfile | head -n1)

          if [ -z "$RESTY_VERSION" ] || [ -z "$RESTY_RELEASE" ]; then
            echo "Failed to parse RESTY_VERSION or RESTY_RELEASE from Dockerfile"
            exit 1
          fi

          echo "resty_version=$RESTY_VERSION" >> "$GITHUB_OUTPUT"
          echo "resty_release=$RESTY_RELEASE" >> "$GITHUB_OUTPUT"
          echo "version=${RESTY_VERSION}.${RESTY_RELEASE}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read
      packages: write
    needs:
      - prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            use_qemu: false
          - arch: arm64
            platform: linux/arm64
            use_qemu: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.use_qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          build-args: |
            RESTY_VERSION=${{ needs.prepare.outputs.resty_version }}
            RESTY_RELEASE=${{ needs.prepare.outputs.resty_release }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          cache-from: type=gha,scope=openresty-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=openresty-${{ matrix.arch }}

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    needs:
      - prepare
      - build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify architecture images
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${{ needs.prepare.outputs.version }}-amd64"
          docker buildx imagetools inspect "${IMAGE_NAME}:${{ needs.prepare.outputs.version }}-arm64"

      - name: Publish version manifest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${{ needs.prepare.outputs.version }}" \
            "${IMAGE_NAME}:${{ needs.prepare.outputs.version }}-amd64" \
            "${IMAGE_NAME}:${{ needs.prepare.outputs.version }}-arm64"

      - name: Publish latest manifest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${{ needs.prepare.outputs.version }}-amd64" \
            "${IMAGE_NAME}:${{ needs.prepare.outputs.version }}-arm64"
