name: Build OpenResty Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/withgardener/server
  RESTY_VERSION: 1.29.2.3
  RESTY_RELEASE: "284"

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            use_qemu: false
          - arch: arm64
            platform: linux/arm64
            use_qemu: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.use_qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          build-args: |
            RESTY_VERSION=${{ env.RESTY_VERSION }}
            RESTY_RELEASE=${{ env.RESTY_RELEASE }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.RESTY_VERSION }}.${{ env.RESTY_RELEASE }}-${{ matrix.arch }}
          cache-from: type=gha,scope=openresty-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=openresty-${{ matrix.arch }}

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    needs:
      - build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify architecture images
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${RESTY_VERSION}.${RESTY_RELEASE}-amd64"
          docker buildx imagetools inspect "${IMAGE_NAME}:${RESTY_VERSION}.${RESTY_RELEASE}-arm64"

      - name: Publish version manifest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${RESTY_VERSION}.${RESTY_RELEASE}" \
            "${IMAGE_NAME}:${RESTY_VERSION}.${RESTY_RELEASE}-amd64" \
            "${IMAGE_NAME}:${RESTY_VERSION}.${RESTY_RELEASE}-arm64"

      - name: Publish latest manifest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${RESTY_VERSION}.${RESTY_RELEASE}-amd64" \
            "${IMAGE_NAME}:${RESTY_VERSION}.${RESTY_RELEASE}-arm64"
